<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
  <title>Speed Booster</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Speed Booster</h1>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div class="stats" id="stats">
      <span id="stats-text">Loading...</span>
    </div>

    <div class="setting">
      <label for="message-limit">Messages to show</label>
      <div class="slider-row">
        <input type="range" id="message-limit" min="10" max="100" step="5" value="30">
        <span id="limit-value">30</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
